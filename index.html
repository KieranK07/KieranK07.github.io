<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Your Name]'s Accomplishments</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>[Your Name]</h1>
            <p>Your tagline or brief description</p>
        </div>
    </header>
    <section class="about" id="about">
        <div class="container">
            <h2>About Me</h2>
            <p>[A brief introduction about yourself]</p>
        </div>
    </section>
    <section class="accomplishments" id="accomplishments">
        <div class="container">
            <h2>Accomplishments</h2>
            <ul>
                <li>[Accomplishment 1]</li>
                <li>[Accomplishment 2]</li>
                <li>[Accomplishment 3]</li>
                <!-- Add more as needed -->
            </ul>
        </div>
    </section>
    <section class="contact" id="contact">
        <div class="container">
            <h2>Contact</h2>
            <p>[Your email or contact information]</p>
        </div>
    </section>
    <footer>
        <div class="container">
            <p>&copy; [Current Year] [Your Name]. All rights reserved.</p>
        </div>
    </footer>
    <script>
        // GSAP animations
        gsap.from("header", { duration: 1, y: -100, opacity: 0 });
        gsap.from(".about", { duration: 1, x: -100, opacity: 0, scrollTrigger: ".about" });
        gsap.from(".accomplishments", { duration: 1, x: 100, opacity: 0, scrollTrigger: ".accomplishments" });
        gsap.from(".contact", { duration: 1, y: 100, opacity: 0, scrollTrigger: ".contact" });
    </script>
</body>
</html>
